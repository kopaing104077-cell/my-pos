<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ထွန်းတောက်ကြယ် POS - v34 (Fix Refresh)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --midnight: #020617; --primary: #1e293b; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --bg: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-top: 65px; padding-bottom: 85px; color: var(--primary); }
        .header { background: var(--midnight); color: white; height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .sync-tag { font-size: 11px; color: var(--gold); font-weight: bold; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; height: 75px; display: flex; border-top: 2px solid var(--midnight); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #94a3b8; font-size: 11px; }
        .nav-item.active { color: var(--midnight); font-weight: bold; }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }
        .container { padding: 12px; display: none; }
        .container.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .input-style { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .p-card { background: white; border-radius: 15px; border: 1px solid #e2e8f0; text-align: center; overflow: hidden; cursor: pointer; }
        .p-card img { width: 100%; height: 110px; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-name { font-weight: bold; font-size: 13px; }
        .p-price { color: var(--green); font-weight: bold; font-size: 14px; }
        .cart-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-green { background: var(--green); color: white; }
        .btn-dark { background: var(--midnight); color: white; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px 20px; border-radius: 20px; width: 320px; text-align: center; }
        .table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        .table th { background: #f8fafc; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        .table td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight:bold;">ထွန်းတောက်ကြယ် POS</div>
        <div class="sync-tag" id="status-text"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        <button onclick="forceSync()" style="background:none; border:none; color:white;"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main id="tab-sales" class="container active">
        <div class="card">
            <div class="grid"><input type="text" id="staff-name" class="input-style" placeholder="အရောင်းသမား"><input type="date" id="sale-date" class="input-style"></div>
            <input type="text" id="cust-name" class="input-style" placeholder="ဝယ်သူအမည်">
        </div>
        <input type="text" id="search-box" class="input-style" placeholder="ပစ္စည်းရှာရန်..." onkeyup="refreshUI()">
        <div class="grid" id="pos-grid"></div>
        <div class="card" style="margin-top:20px;">
            <h4>ခြင်းတောင်း</h4>
            <div id="cart-list"></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.3rem; margin-top:15px;">
                <span>Total:</span><span id="cart-total" style="color:var(--red);">0 Ks</span>
            </div>
            <div class="grid" style="margin-top:20px;">
                <button class="btn btn-dark" onclick="processSale(true)"><i class="fas fa-print"></i> ဘောင်ချာ</button>
                <button class="btn btn-green" onclick="processSale(false)"><i class="fas fa-save"></i> သိမ်းမည်</button>
            </div>
        </div>
    </main>

    <main id="tab-stock" class="container">
        <div class="card">
            <h3 style="margin-bottom:15px;">Stock လက်ကျန်</h3>
            <table class="table">
                <thead><tr><th style="text-align:left;">အမည်</th><th>ဈေးနှုန်း</th><th>Stock</th></tr></thead>
                <tbody id="stock-list"></tbody>
            </table>
        </div>
    </main>

    <main id="tab-inv" class="container">
        <div class="card">
            <h4>ပစ္စည်းသစ်ထည့်ရန်</h4><br>
            <input type="text" id="p-name" class="input-style" placeholder="အမည်">
            <div class="grid"><input type="number" id="p-buy" class="input-style" placeholder="ဝယ်ဈေး"><input type="number" id="p-sell" class="input-style" placeholder="ရောင်းဈေး"></div>
            <input type="number" id="p-qty" class="input-style" placeholder="အရေအတွက်">
            <input type="file" accept="image/*" onchange="previewImg(event)" class="input-style">
            <button class="btn btn-dark" onclick="handleProductAction()">သိမ်းမည်</button>
        </div>
        <div class="card" style="overflow-x: auto;">
            <table class="table">
                <thead style="background:#ecfdf5;"><tr><th>အမည်</th><th>ရောင်းဈေး</th><th>Stock</th><th>Action</th></tr></thead>
                <tbody id="inv-list"></tbody>
            </table>
        </div>
    </main>

    <nav class="nav">
        <button class="nav-item active" onclick="switchTab('tab-sales', this)"><i class="fas fa-shopping-cart"></i>အရောင်း</button>
        <button class="nav-item" onclick="switchTab('tab-stock', this)"><i class="fas fa-boxes"></i>Stock</button>
        <button class="nav-item" onclick="showLogin('tab-inv', this)"><i class="fas fa-warehouse"></i>ဂိုထောင်</button>
    </nav>

    <div id="stock-update-overlay" class="overlay">
        <div class="login-card">
            <h3 id="update-p-name">ပစ္စည်းအမည်</h3><br>
            <input type="number" id="update-p-sell" class="input-style" placeholder="ရောင်းဈေး">
            <input type="number" id="update-new-qty" class="input-style" placeholder="ပေါင်းမည့်အရေအတွက်">
            <div class="grid">
                <button class="btn btn-green" onclick="saveStockUpdate()">Save</button>
                <button class="btn" style="background:#ddd" onclick="closeStockUpdate()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h3>Password ရိုက်ပါ</h3>
            <input type="password" id="pass-input" class="input-style" style="text-align:center; margin-top:15px;" placeholder="******">
            <button class="btn btn-dark" onclick="checkPassword()">Unlock</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyniFvoqBEkqUvJVJl8rzabubJD9L3qTgqYi4xl559CmaHQXrD_muJTZ4a-k97SVcmx/exec';
        
        let products = JSON.parse(localStorage.getItem('TTK_Data_P')) || [];
        let sales = JSON.parse(localStorage.getItem('TTK_Data_S')) || [];
        let cart = [], tempImg = "", targetTab = "", currentEditingId = null;

        // --- CLOUD ENGINE (FIXED) ---
        async function uploadToCloud() {
            updateStatus("Saving...", "var(--gold)");
            const dataToSave = JSON.stringify({ products, sales });
            try {
                // Fetch with no-cors doesn't return response, but we can check the status on the next download
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: dataToSave 
                });
                updateStatus("<i class='fas fa-check'></i> Saved to Cloud", "var(--green)");
            } catch(e) { 
                updateStatus("Offline (Local Saved)", "var(--red)"); 
            }
        }

        async function downloadFromCloud() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Cloud မှာ Data အမှန်တကယ်ရှိမှသာ Local ကို အစားထိုးမယ်
                if(data && data.products && data.products.length > 0) {
                    products = data.products;
                    sales = data.sales || [];
                    saveLocal();
                    refreshUI();
                    updateStatus("<i class='fas fa-cloud'></i> Online", "var(--green)");
                } else {
                    updateStatus("Cloud is Empty", "var(--gold)");
                    refreshUI();
                }
            } catch(e) {
                updateStatus("Using Local Data", "var(--gold)");
                refreshUI();
            }
        }

        function saveLocal() {
            localStorage.setItem('TTK_Data_P', JSON.stringify(products));
            localStorage.setItem('TTK_Data_S', JSON.stringify(sales));
        }

        function updateEverything() {
            saveLocal();
            refreshUI();
            uploadToCloud();
        }

        // UI & Functions
        function refreshUI() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const filt = products.filter(p => p.name.toLowerCase().includes(q));
            
            document.getElementById('pos-grid').innerHTML = filt.map(p => `<div class="p-card" onclick="addToCart(${p.id})"><img src="${p.img || 'https://via.placeholder.com/150'}"><div class="p-info"><b>${p.name}</b><br><span class="p-price">${p.sell.toLocaleString()} Ks</span></div></div>`).join('');
            document.getElementById('stock-list').innerHTML = products.map(p => `<tr><td style="text-align:left">${p.name}</td><td>${p.sell.toLocaleString()}</td><td>${p.qty}</td></tr>`).join('');
            document.getElementById('inv-list').innerHTML = products.map(p => `<tr><td style="text-align:left">${p.name}</td><td>${p.sell}</td><td>${p.qty}</td><td><button onclick="openStockUpdate(${p.id})" style="border:none; color:blue;">Edit</button></td></tr>`).join('');
        }

        function handleProductAction() {
            const name = document.getElementById('p-name').value, b = parseFloat(document.getElementById('p-buy').value), s = parseFloat(document.getElementById('p-sell').value), q = parseInt(document.getElementById('p-qty').value);
            if(!name || isNaN(b) || isNaN(s) || isNaN(q)) return alert("Fill all!");
            products.push({ id: Date.now(), name, buy: b, sell: s, qty: q, img: tempImg });
            updateEverything();
            ['p-name','p-buy','p-sell','p-qty'].forEach(i => document.getElementById(i).value=""); tempImg="";
        }

        function addToCart(id) {
            const p = products.find(x => x.id == id);
            if(p.qty <= 0) return alert("Out of stock");
            const ex = cart.find(x => x.id == id);
            if(ex) { ex.cQty++; } else { cart.push({...p, cQty: 1}); }
            renderCart();
        }

        function renderCart() {
            let t = 0; document.getElementById('cart-list').innerHTML = cart.map(i => { t += i.sell * i.cQty; return `<div class="cart-row"><span>${i.name} x ${i.cQty}</span><span>${(i.sell*i.cQty).toLocaleString()}</span></div>`; }).join('');
            document.getElementById('cart-total').innerText = t.toLocaleString() + " Ks";
        }

        function processSale(print) {
            if(!cart.length) return;
            cart.forEach(i => { const p = products.find(x => x.id == i.id); p.qty -= i.cQty; });
            sales.push({ id: Date.now(), date: document.getElementById('sale-date').value, rev: cart.reduce((a,b)=>a+(b.sell*b.cQty),0) });
            cart = []; renderCart(); updateEverything();
            if(print) alert("Boucher Printed (Simulated)");
        }

        function openStockUpdate(id) { currentEditingId = id; const p = products.find(x => x.id == id); document.getElementById('update-p-name').innerText = p.name; document.getElementById('update-p-sell').value = p.sell; document.getElementById('stock-update-overlay').style.display='flex'; }
        function saveStockUpdate() { const p = products.find(x => x.id == currentEditingId); p.sell = parseFloat(document.getElementById('update-p-sell').value); p.qty += parseInt(document.getElementById('update-new-qty').value || 0); updateEverything(); closeStockUpdate(); }
        function closeStockUpdate() { document.getElementById('stock-update-overlay').style.display='none'; }
        function updateStatus(t, c) { const el = document.getElementById('status-text'); el.innerHTML = t; el.style.color = c; }
        function forceSync() { downloadFromCloud(); }
        function showLogin(id, btn) { targetTab = id; document.getElementById('login-overlay').style.display='flex'; }
        function checkPassword() { if(document.getElementById('pass-input').value === "111111") { document.getElementById('login-overlay').style.display='none'; switchTab(targetTab); } else alert("Wrong!"); }
        function switchTab(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function previewImg(e) { const r = new FileReader(); r.onload = () => tempImg = r.result; r.readAsDataURL(e.target.files[0]); }

        window.onload = () => { 
            document.getElementById('sale-date').valueAsDate = new Date();
            // ပထမဆုံး Local က Data ကိုအရင်ပြမယ်
            refreshUI(); 
            // ပြီးမှ Cloud က Data ကိုလှမ်းဆွဲပြီး Update လုပ်မယ်
            downloadFromCloud(); 
        };
    </script>
</body>
</html>
