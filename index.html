<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ထွန်းတောက်ကြယ် POS - v44</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --midnight: #020617; --primary: #1e293b; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --bg: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-top: 65px; padding-bottom: 85px; color: var(--primary); }

        .header { background: var(--midnight); color: white; height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .sync-tag { font-size: 11px; font-weight: bold; padding: 5px 12px; border-radius: 20px; }
        .status-online { color: var(--green); background: rgba(16, 185, 129, 0.1); }
        .status-syncing { color: var(--gold); background: rgba(251, 191, 36, 0.1); }
        .status-offline { color: var(--red); background: rgba(239, 68, 68, 0.1); }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; height: 75px; display: flex; border-top: 2px solid var(--midnight); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #94a3b8; font-size: 11px; }
        .nav-item.active { color: var(--midnight); font-weight: bold; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        .container { padding: 12px; display: none; }
        .container.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .input-style { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        #pos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .p-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; overflow: hidden; }
        .p-card img { width: 100%; height: 100px; object-fit: cover; }
        
        .table-wrapper { overflow-x: auto; background: white; border-radius: 10px; }
        .table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table th, .table td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; text-align: left; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; overflow-y:auto;}
        .modal-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-green { background: var(--green); color: white; }
        .btn-dark { background: var(--midnight); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        .sale-row { border-left: 4px solid var(--midnight); padding-left: 10px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight:bold;"><i class="fas fa-star" style="color:var(--gold)"></i> ထွန်းတောက်ကြယ်</div>
        <div id="status-tag" class="sync-tag status-syncing">Connecting...</div>
    </header>

    <main id="tab-sales" class="container active">
        <div class="card">
            <div class="grid">
                <input type="text" id="staff-name" class="input-style" placeholder="အရောင်းသမား">
                <input type="date" id="sale-date" class="input-style">
            </div>
            <input type="text" id="cust-name" class="input-style" placeholder="ဝယ်သူအမည်">
        </div>
        <input type="text" id="search-box" class="input-style" placeholder="ပစ္စည်းရှာရန်..." onkeyup="refreshUI()">
        <div id="pos-grid"></div>

        <div class="card" style="margin-top:20px;">
            <h4><i class="fas fa-shopping-basket"></i> Cart</h4>
            <div id="cart-list" style="margin:10px 0;"></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.1rem;">
                <span>Total:</span><span id="cart-total" style="color:var(--red);">0 Ks</span>
            </div>
            <div class="grid" style="margin-top:15px;">
                <button class="btn btn-dark" onclick="processSale(true)"><i class="fas fa-print"></i> Print</button>
                <button class="btn btn-green" onclick="processSale(false)"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>
    </main>

    <main id="tab-stock" class="container">
        <div class="card"><h3>လက်ကျန်စာရင်း</h3><div class="table-wrapper"><table class="table"><thead><tr><th>အမည်</th><th>ဈေး</th><th>ကျန်</th></tr></thead><tbody id="stock-list"></tbody></table></div></div>
    </main>

    <main id="tab-inv" class="container">
        <div class="card"><button class="btn btn-dark" onclick="openAddModal()">+ ပစ္စည်းသစ်</button></div>
        <div class="card"><div class="table-wrapper"><table class="table"><thead><tr><th>ပုံ</th><th>အမည်</th><th>ဝယ်</th><th>ရောင်း</th><th>Stock</th><th></th></tr></thead><tbody id="inv-list"></tbody></table></div></div>
    </main>

    <main id="tab-rep" class="container">
        <div class="card">
            <div class="grid"><input type="date" id="rep-day" class="input-style"><button class="btn btn-dark" onclick="runReport()">Check</button></div>
            <div class="grid" style="margin-top:10px;">
                <div style="background:#eee; padding:10px; border-radius:8px; text-align:center;"><small>ရောင်းရငွေ</small><br><b id="sum-rev">0</b></div>
                <div style="background:#eee; padding:10px; border-radius:8px; text-align:center;"><small>အမြတ်</small><br><b id="sum-prof">0</b></div>
            </div>
        </div>
        <div class="card">
            <h4>အရောင်းမှတ်တမ်း (History)</h4><br>
            <div id="history-list"></div>
        </div>
    </main>

    <nav class="nav">
        <button class="nav-item active" onclick="switchTab('tab-sales', this)"><i class="fas fa-cash-register"></i>အရောင်း</button>
        <button class="nav-item" onclick="switchTab('tab-stock', this)"><i class="fas fa-box-open"></i>လက်ကျန်</button>
        <button class="nav-item" onclick="showLogin('tab-inv', this)"><i class="fas fa-warehouse"></i>ဂိုထောင်</button>
        <button class="nav-item" onclick="showLogin('tab-rep', this)"><i class="fas fa-chart-pie"></i>စာရင်းချုပ်</button>
    </nav>

    <div id="login-overlay" class="overlay"><div class="modal-card"><input type="password" id="pass-input" class="input-style" placeholder="Password"><button class="btn btn-dark" onclick="verifyPass()">Unlock</button></div></div>
    <div id="add-overlay" class="overlay"><div class="modal-card"><h3>ပစ္စည်းသစ်</h3><input type="text" id="p-name" class="input-style" placeholder="အမည်"><input type="number" id="p-buy" class="input-style" placeholder="ဝယ်ဈေး"><input type="number" id="p-sell" class="input-style" placeholder="ရောင်းဈေး"><input type="number" id="p-qty" class="input-style" placeholder="အရေအတွက်"><input type="file" accept="image/*" onchange="previewImg(event)" class="input-style"><button class="btn btn-green" onclick="addProduct()">Save</button><br><button class="btn" onclick="closeOverlay('add-overlay')">Close</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, goOnline } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmwxqmg3tLc5qRNXriwgy075vIrObjXOc",
            authDomain: "taukkyairpos.firebaseapp.com",
            databaseURL: "https://taukkyairpos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taukkyairpos",
            storageBucket: "taukkyairpos.firebasestorage.app",
            messagingSenderId: "352705494465",
            appId: "1:352705494465:web:9efe723bed9bdcaf324340"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        goOnline(db); // VPN မပါဘဲ ပိုမြန်အောင် တိုက်ရိုက် Online ခေါ်ခြင်း

        let products = [], sales = [], cart = [], tempImg = "", targetTab = "";

        onValue(ref(db, 'pos_data/database'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                products = data.products || [];
                sales = data.sales || [];
                localStorage.setItem('TTK_P', JSON.stringify(products));
                localStorage.setItem('TTK_S', JSON.stringify(sales));
                window.refreshUI();
                document.getElementById('status-tag').className = 'sync-tag status-online';
                document.getElementById('status-tag').innerText = 'Cloud Synced';
            }
        });

        window.syncToCloud = async () => {
            document.getElementById('status-tag').innerText = 'Saving...';
            await set(ref(db, 'pos_data/database'), { products, sales });
        };

        // Bluetooth Print Function
        window.printBT = async (text) => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                const encoder = new TextEncoder();
                await char.writeValue(encoder.encode(text + "\n\n\n"));
                alert("Printing Done");
            } catch (e) { alert("Printer Error: " + e.message); }
        };

        window.processSale = (isPrint) => {
            if(!cart.length) return;
            const date = document.getElementById('sale-date').value || new Date().toISOString().split('T')[0];
            let rev = 0, prof = 0, items = [];
            let printText = "Tauk Kyair POS\n-------------\n";
            
            cart.forEach(i => {
                const p = products.find(x => x.id == i.id);
                p.qty -= i.cQty;
                rev += i.sell * i.cQty;
                prof += (i.sell - p.buy) * i.cQty;
                items.push({ id: i.id, n: i.name, q: i.cQty, s: i.sell * i.cQty });
                printText += `${i.name} x ${i.cQty}\n${(i.sell * i.cQty).toLocaleString()} Ks\n`;
            });
            
            const saleObj = { id: Date.now(), date, rev, prof, items, cust: document.getElementById('cust-name').value };
            sales.push(saleObj);
            printText += `-------------\nTotal: ${rev.toLocaleString()} Ks`;
            
            cart = []; window.renderCart(); window.syncToCloud();
            if(isPrint) window.printBT(printText);
        };

        window.runReport = () => {
            const d = document.getElementById('rep-day').value;
            const filt = sales.filter(s => s.date === d);
            let r=0, p=0;
            document.getElementById('history-list').innerHTML = filt.map(s => {
                r += s.rev; p += s.prof;
                return `
                <div class="sale-row">
                    <div style="display:flex; justify-content:space-between;">
                        <b>ID: ${s.id.toString().slice(-5)}</b>
                        <button onclick="deleteSale(${s.id})" style="color:red; border:none; background:none;"><i class="fas fa-trash"></i> ဖျက်မည်</button>
                    </div>
                    <small>${s.cust || 'Normal Cust'}</small><br>
                    <span>Amt: ${s.rev.toLocaleString()} Ks</span>
                </div>`;
            }).join('');
            document.getElementById('sum-rev').innerText = r.toLocaleString();
            document.getElementById('sum-prof').innerText = Math.round(p).toLocaleString();
        };

        window.deleteSale = (sid) => {
            if(!confirm("ဤစာရင်းကိုဖျက်ပြီး Stock ပြန်ပေါင်းမလား?")) return;
            const sale = sales.find(s => s.id === sid);
            sale.items.forEach(it => {
                const p = products.find(x => x.id === it.id);
                if(p) p.qty += it.q;
            });
            sales = sales.filter(s => s.id !== sid);
            window.syncToCloud();
            window.runReport();
        };

        // --- Standard UI Logic ---
        window.switchTab = (id, btn) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active');
            window.refreshUI();
        };

        window.showLogin = (id, btn) => {
            targetTab = id;
            if (localStorage.getItem('TTK_LOGGED') === 'true') window.switchTab(id, btn);
            else document.getElementById('login-overlay').style.display = 'flex';
        };

        window.verifyPass = () => {
            if (document.getElementById('pass-input').value === "111111") {
                localStorage.setItem('TTK_LOGGED', 'true');
                document.getElementById('login-overlay').style.display = 'none';
                window.switchTab(targetTab, null);
            } else alert("Error");
        };

        window.refreshUI = () => {
            const q = document.getElementById('search-box')?.value.toLowerCase() || "";
            const filt = products.filter(p => p.name.toLowerCase().includes(q));
            document.getElementById('pos-grid').innerHTML = filt.map(p => `
                <div class="p-card" onclick="addToCart(${p.id})">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div style="padding:8px; font-size:12px;">${p.name}<br><b>${p.sell.toLocaleString()}</b></div>
                </div>`).join('');
            document.getElementById('stock-list').innerHTML = products.map(p => `<tr><td>${p.name}</td><td>${p.sell}</td><td>${p.qty}</td></tr>`).join('');
            document.getElementById('inv-list').innerHTML = products.map(p => `<tr><td><img src="${p.img}" width="30"></td><td>${p.name}</td><td>${p.buy}</td><td>${p.sell}</td><td>${p.qty}</td><td><button onclick="deleteProduct(${p.id})">X</button></td></tr>`).join('');
        };

        window.addToCart = (id) => {
            const p = products.find(x => x.id == id);
            if(p.qty <= 0) return alert("Out of stock");
            const ex = cart.find(x => x.id == id);
            if(ex) ex.cQty++; else cart.push({...p, cQty: 1});
            window.renderCart();
        };

        window.renderCart = () => {
            let t = 0;
            document.getElementById('cart-list').innerHTML = cart.map(i => {
                t += i.sell * i.cQty;
                return `<div>${i.name} x ${i.cQty}</div>`;
            }).join('');
            document.getElementById('cart-total').innerText = t.toLocaleString() + " Ks";
        };

        window.previewImg = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    tempImg = canvas.toDataURL('image/jpeg', 0.5);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        window.addProduct = () => {
            products.push({ id: Date.now(), name: document.getElementById('p-name').value, buy: parseFloat(document.getElementById('p-buy').value), sell: parseFloat(document.getElementById('p-sell').value), qty: parseInt(document.getElementById('p-qty').value), img: tempImg });
            window.syncToCloud(); document.getElementById('add-overlay').style.display = 'none';
        };

        window.deleteProduct = (id) => { if(confirm("Delete?")) { products = products.filter(x => x.id !== id); window.syncToCloud(); } };
        window.openAddModal = () => document.getElementById('add-overlay').style.display = 'flex';
        window.closeOverlay = (id) => document.getElementById(id).style.display = 'none';
        
        window.onload = () => { document.getElementById('sale-date').valueAsDate = new Date(); document.getElementById('rep-day').valueAsDate = new Date(); };
    </script>
</body>
</html>
