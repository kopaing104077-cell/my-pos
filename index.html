<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ထွန်းတောက်ကြယ် POS - v20 (Full Sync)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --midnight: #020617; --bg-light: #f1f5f9; --border: #e2e8f0; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --blue: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); padding-top: 60px; padding-bottom: 80px; }

        /* Top Bar & Sync Status */
        .top-bar { background: var(--midnight); color: white; height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; top: 0; z-index: 1000; }
        #sync-status { font-size: 11px; color: var(--green); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; height: 65px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #64748b; font-size: 10px; gap: 4px; }
        .nav-item.active { color: var(--midnight); font-weight: bold; border-top: 3px solid var(--midnight); }

        .tab-pane { display: none; padding: 12px; }
        .tab-pane.active { display: block; }

        /* UI Cards & Elements */
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .input-style { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; font-size: 14px; outline: none; }
        .btn-green { background: var(--green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }

        /* Grid & Cart */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .p-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; }
        .p-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 6px; margin-bottom: 5px; background: #eee; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #e2e8f0; border: none; width: 24px; height: 24px; border-radius: 4px; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .data-table th, .data-table td { padding: 8px; border: 1px solid #eee; text-align: center; }
        
        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 380px; margin: 40px auto; padding: 20px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand-name"><i class="fas fa-star" style="color:var(--gold)"></i> ထွန်းတောက်ကြယ်</div>
        <div id="sync-status">Cloud Sync Active</div>
        <button onclick="uploadToCloud()" style="color:var(--green); background:none; border:none; font-size: 1.2rem;"><i class="fas fa-sync"></i></button>
    </header>

    <section id="sales-tab" class="tab-pane active">
        <input type="text" id="search-box" placeholder="ပစ္စည်းရှာရန်..." class="input-style" onkeyup="filterPOS()">
        <div class="product-grid" id="pos-grid"></div>
        <div class="card" style="margin-top: 20px; border: 2px solid var(--midnight);">
            <div id="cart-list"></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin:15px 0;"><span>စုစုပေါင်း:</span><span id="total-amount">0 Ks</span></div>
            <input type="text" id="customer-shop" placeholder="ဝယ်သူအမည်" class="input-style">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn-green" onclick="openBillPreview(true)">Print</button>
                <button class="btn-blue" onclick="openBillPreview(false)">Save</button>
            </div>
            <button class="btn-red" style="margin-top:8px; width:100%" onclick="resetCart()">စာရင်းဖျက်</button>
        </div>
    </section>

    <section id="stock-tab" class="tab-pane">
        <div class="card" style="background:var(--midnight); color:white; text-align:center;"><h3 id="stock-count">0</h3><p>ပစ္စည်းစုစုပေါင်း</p></div>
        <div class="card"><table class="data-table"><thead><tr><th>အမည်</th><th>ဈေးနှုန်း</th><th>လက်ကျန်</th></tr></thead><tbody id="stock-rows"></tbody></table></div>
    </section>

    <section id="inventory-tab" class="tab-pane">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><h4>ဂိုထောင်</h4><button class="btn-red" style="width:auto; padding:5px 10px;" onclick="userLogout()">Logout</button></div>
        <div class="card">
            <input type="text" id="p-name" placeholder="အမည်" class="input-style">
            <div style="display:flex; gap:5px;"><input type="number" id="p-buy" placeholder="ဝယ်စျေး" class="input-style"><input type="number" id="p-sell" placeholder="ရောင်းစျေး" class="input-style"></div>
            <input type="number" id="p-qty" placeholder="အရေအတွက်" class="input-style">
            <input type="file" accept="image/*" class="input-style" onchange="previewImg(event)">
            <img id="img-v" src="" style="display:none; width:100%; height:100px; object-fit:contain; margin-bottom:10px;">
            <button class="btn-green" onclick="saveProduct()">ပစ္စည်းအသစ်ထည့်မည်</button>
        </div>
        <div class="card"><div class="table-responsive"><table class="data-table"><thead><tr><th>ပုံ</th><th>အမည်</th><th>ဝယ်</th><th>ရောင်း</th><th>Stock</th><th>Action</th></tr></thead><tbody id="inventory-rows"></tbody></table></div></div>
    </section>

    <section id="report-tab" class="tab-pane">
        <div class="card">
            <h4>စာရင်းချုပ်</h4><br>
            <div style="display:flex; gap:5px; margin-bottom:8px;"><input type="date" id="date-pick" class="input-style"><button class="btn-green" onclick="getReport('day')">နေ့စဉ်</button></div>
            <div style="display:flex; gap:5px; margin-bottom:8px;"><input type="month" id="month-pick" class="input-style"><button class="btn-blue" onclick="getReport('month')">လစဉ်</button></div>
            <div style="display:flex; gap:5px; margin-bottom:8px;"><select id="year-pick" class="input-style"><option value="2025">2025</option><option value="2026">2026</option></select><button class="btn-green" style="background:var(--midnight)" onclick="getReport('year')">နှစ်စဉ်</button></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; text-align:center;">
                <div style="background:#f1f5f9; padding:10px; border-radius:8px;"><small>ရောင်းရငွေ</small><div id="total-rev" style="font-weight:bold;">0</div></div>
                <div style="background:#f1f5f9; padding:10px; border-radius:8px;"><small>အမြတ်</small><div id="total-prof" style="font-weight:bold; color:var(--green);">0</div></div>
            </div>
        </div>
        <div class="card"><h4>နေ့စဉ် ပစ္စည်းရောင်းရမှု</h4><table class="data-table"><thead><tr><th>ပစ္စည်း</th><th>Qty</th><th>စုစုပေါင်း</th></tr></thead><tbody id="item-report-rows"></tbody></table></div>
        <div class="card"><h4>ဘောင်ချာမှတ်တမ်း</h4><table class="data-table"><thead><tr><th>နေ့စွဲ</th><th>ဝယ်သူ</th><th>ငွေ</th><th></th></tr></thead><tbody id="report-rows"></tbody></table></div>
    </section>

    <nav class="bottom-nav">
        <button class="nav-item active" id="btn-sales" onclick="switchTab('sales-tab')"><i class="fas fa-store"></i><span>အရောင်း</span></button>
        <button class="nav-item" id="btn-stock" onclick="switchTab('stock-tab')"><i class="fas fa-list"></i><span>Stock</span></button>
        <button class="nav-item" id="btn-inv" onclick="checkAuth('inventory-tab')"><i class="fas fa-boxes"></i><span>ဂိုထောင်</span></button>
        <button class="nav-item" id="btn-rep" onclick="checkAuth('report-tab')"><i class="fas fa-chart-line"></i><span>စာရင်းချုပ်</span></button>
    </nav>

    <div id="login-modal" class="modal"><div class="modal-content"><h3>Admin Login</h3><br><input type="password" id="admin-pass" class="input-style" placeholder="Password"><button class="btn-green" onclick="handleLogin()">ဝင်မည်</button><button onclick="closeModal()" style="border:none; background:none; width:100%; margin-top:10px;">ပိတ်မည်</button></div></div>
    <div id="restock-modal" class="modal"><div class="modal-content"><h3 id="rs-title"></h3><br><input type="number" id="rs-qty" class="input-style" placeholder="အရေအတွက်အသစ်"><input type="number" id="rs-buy" class="input-style" placeholder="ဝယ်ဈေးအသစ်"><button class="btn-green" onclick="calculateRestock()">Update (Average)</button><button onclick="closeRestock()" style="border:none; background:none; width:100%; margin-top:10px;">မလုပ်တော့ပါ</button></div></div>
    <div id="receipt-modal" class="modal"><div class="modal-content"><div id="receipt-visible-area" style="font-family:monospace;"></div><div id="modal-actions" style="margin-top:20px;"></div><button class="btn-red" style="background:#64748b" onclick="closeReceiptModal()">Close</button></div></div>

    <script>
        // --- GOOGLE SCRIPT URL INTEGRATED ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUgcguSOZ6JYAX1_QQk0s6aMnTI1JPBRYo5BrkujyG9hSpHNroYtj1EppH_8hWI4lswQ/exec';
        
        const STORAGE_P = 'TTK_PROD_V10', STORAGE_S = 'TTK_SALE_V10';
        let db_p = JSON.parse(localStorage.getItem(STORAGE_P)) || [];
        let db_s = JSON.parse(localStorage.getItem(STORAGE_S)) || [];
        let currentCart = [], uploadedImg = "", selectedProdId = null;

        // --- CLOUD FUNCTIONS ---
        async function uploadToCloud() {
            document.getElementById('sync-status').innerText = "Syncing...";
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ products: db_p, sales: db_s })
                });
                document.getElementById('sync-status').innerText = "Cloud Synced";
            } catch (e) { 
                document.getElementById('sync-status').innerText = "Offline Mode";
            }
        }

        async function downloadFromCloud() {
            document.getElementById('sync-status').innerText = "Updating...";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.products) { db_p = data.products; localStorage.setItem(STORAGE_P, JSON.stringify(db_p)); }
                if(data.sales) { db_s = data.sales; localStorage.setItem(STORAGE_S, JSON.stringify(db_s)); }
                syncAll();
                document.getElementById('sync-status').innerText = "Cloud Sync Active";
            } catch (e) {
                document.getElementById('sync-status').innerText = "Offline Mode";
            }
        }

        // --- CORE LOGIC ---
        function syncAll() { renderPOS(); renderStock(); renderInv(); }
        function save() { 
            localStorage.setItem(STORAGE_P, JSON.stringify(db_p)); 
            localStorage.setItem(STORAGE_S, JSON.stringify(db_s)); 
            uploadToCloud(); 
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            syncAll();
        }

        // POS & CART
        function renderPOS(items=db_p) {
            document.getElementById('pos-grid').innerHTML = items.map(p=>`
                <div class="p-card" onclick="addToCart(${p.id})">
                    <img src="${p.img||'https://via.placeholder.com/100'}">
                    <div style="font-weight:bold; font-size:13px; height:36px; overflow:hidden;">${p.name}</div>
                    <div style="color:var(--green)">${p.sell.toLocaleString()} Ks</div>
                    <div style="font-size:10px; color:${p.qty<=5?'red':'gray'}">Stock: ${p.qty}</div>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = db_p.find(x=>x.id==id);
            if(p.qty<=0) return alert("ကုန်နေပါပြီ");
            const ex = currentCart.find(x=>x.id==id);
            if(ex) { if(ex.cQty < p.qty) ex.cQty++; else alert("Stock ထက်ပိုရောင်းမရပါ"); }
            else { currentCart.push({...p, cQty:1}); }
            renderCart();
        }

        function updateCartQty(id, amt) {
            const i = currentCart.find(x=>x.id==id);
            if(i) {
                i.cQty += amt;
                const p = db_p.find(x=>x.id==id);
                if(i.cQty > p.qty) i.cQty = p.qty;
                if(i.cQty <= 0) currentCart = currentCart.filter(x=>x.id!==id);
                renderCart();
            }
        }

        function renderCart() {
            let t=0;
            document.getElementById('cart-list').innerHTML = currentCart.map(i=>{
                t += i.sell * i.cQty;
                return `<div class="cart-item">
                    <div><b>${i.name}</b><br><small>${i.sell.toLocaleString()}</small></div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateCartQty(${i.id},-1)">-</button>
                        <span>${i.cQty}</span>
                        <button class="qty-btn" onclick="updateCartQty(${i.id},1)">+</button>
                    </div>
                    <div>${(i.sell*i.cQty).toLocaleString()}</div>
                </div>`;
            }).join('');
            document.getElementById('total-amount').innerText = t.toLocaleString() + " Ks";
        }

        // Inventory & Average Cost
        function saveProduct() {
            const n=document.getElementById('p-name').value, b=parseFloat(document.getElementById('p-buy').value), s=parseFloat(document.getElementById('p-sell').value), q=parseInt(document.getElementById('p-qty').value);
            if(!n || isNaN(s)) return alert("အမည်နှင့် ရောင်းဈေးဖြည့်ပါ");
            db_p.push({id:Date.now(), name:n, buy:b||0, sell:s, qty:q||0, img:uploadedImg});
            save(); syncAll(); document.getElementById('p-name').value=""; uploadedImg=""; document.getElementById('img-v').style.display='none';
        }

        function openRestock(id) { selectedProdId=id; document.getElementById('rs-title').innerText=db_p.find(x=>x.id==id).name; document.getElementById('restock-modal').style.display='block'; }
        
        function calculateRestock() {
            const nQ=parseInt(document.getElementById('rs-qty').value), nB=parseFloat(document.getElementById('rs-buy').value);
            if(isNaN(nQ) || isNaN(nB)) return alert("အချက်အလက်အမှန်ထည့်ပါ");
            const p = db_p.find(x=>x.id==selectedProdId);
            p.buy = Math.round(((p.qty * p.buy) + (nQ * nB)) / (p.qty + nQ));
            p.qty += nQ;
            save(); syncAll(); closeRestock();
        }

        // Sale Process
        function openBillPreview(print) {
            if(!currentCart.length) return alert("စာရင်းမရှိပါ");
            const shop = document.getElementById('customer-shop').value || "အထွေထွေ";
            let rows = currentCart.map(i=>`<div style="display:flex; justify-content:space-between"><span>${i.name} x ${i.cQty}</span><span>${(i.sell*i.cQty).toLocaleString()}</span></div>`).join('');
            document.getElementById('receipt-visible-area').innerHTML = `
                <center><b>ထွန်းတောက်ကြယ်</b></center><hr>
                <small>နေ့စွဲ: ${new Date().toLocaleString()}<br>ဝယ်သူ: ${shop}</small><hr>
                ${rows}<hr>
                <div style="display:flex; justify-content:space-between"><b>Total:</b><b>${document.getElementById('total-amount').innerText}</b></div>`;
            document.getElementById('modal-actions').innerHTML = `<button class="btn-green" onclick="finalizeSale(${print})">Confirm Sale</button>`;
            document.getElementById('receipt-modal').style.display='block';
        }

        function finalizeSale(print) {
            let r=0, pr=0, soldItems=[];
            currentCart.forEach(i=>{
                const p=db_p.find(x=>x.id==i.id);
                p.qty -= i.cQty; r += i.sell*i.cQty; pr += (i.sell-i.buy)*i.cQty;
                soldItems.push({n:i.name, q:i.cQty, s:i.sell*i.cQty});
            });
            db_s.push({id:Date.now(), date:new Date().toISOString().split('T')[0], customer:document.getElementById('customer-shop').value, rev:r, prof:pr, items:soldItems});
            save(); if(print) window.print();
            currentCart=[]; document.getElementById('receipt-modal').style.display='none';
            renderCart(); syncAll();
        }

        // Reports
        function getReport(type) {
            const d=document.getElementById('date-pick').value, m=document.getElementById('month-pick').value, y=document.getElementById('year-pick').value;
            let f = db_s.filter(s => (type==='day' && s.date===d) || (type==='month' && s.date.startsWith(m)) || (type==='year' && s.date.startsWith(y)));
            let tr=0, tp=0, summary={};
            document.getElementById('report-rows').innerHTML = f.map(s=>{
                tr+=s.rev; tp+=s.prof;
                s.items.forEach(it=>{ if(!summary[it.n]) summary[it.n]={q:0,s:0}; summary[it.n].q+=it.q; summary[it.n].s+=it.s; });
                return `<tr><td>${s.date}</td><td>${s.customer||'-'}</td><td>${s.rev.toLocaleString()}</td><td><button onclick="delSale(${s.id})" style="border:none;color:red;background:none"><i class="fas fa-trash"></i></button></td></tr>`;
            }).reverse().join('');
            document.getElementById('total-rev').innerText = tr.toLocaleString(); document.getElementById('total-prof').innerText = tp.toLocaleString();
            document.getElementById('item-report-rows').innerHTML = Object.keys(summary).map(k=>`<tr><td style="text-align:left">${k}</td><td>${summary[k].q}</td><td>${summary[k].s.toLocaleString()}</td></tr>`).join('');
        }

        // Utils
        function filterPOS() { const q=document.getElementById('search-box').value.toLowerCase(); renderPOS(db_p.filter(p=>p.name.toLowerCase().includes(q))); }
        function renderStock() { document.getElementById('stock-count').innerText=db_p.length; document.getElementById('stock-rows').innerHTML=db_p.map(p=>`<tr><td>${p.name}</td><td>${p.sell.toLocaleString()}</td><td><b>${p.qty}</b></td></tr>`).join(''); }
        function renderInv() { document.getElementById('inventory-rows').innerHTML=db_p.map(p=>`<tr><td><img src="${p.img}" width="30"></td><td style="text-align:left">${p.name}</td><td>${p.buy}</td><td>${p.sell}</td><td>${p.qty}</td><td><button onclick="openRestock(${p.id})">+</button> <button onclick="delP(${p.id})" style="color:red;border:none;background:none"><i class="fas fa-trash"></i></button></td></tr>`).join(''); }
        function delP(id) { if(confirm("ဖျက်မှာလား?")) { db_p=db_p.filter(x=>x.id!=id); save(); syncAll(); } }
        function delSale(id) { if(confirm("ဖျက်မှာလား?")) { db_s=db_s.filter(x=>x.id!=id); save(); getReport('day'); } }
        function previewImg(e) { const r=new FileReader(); r.onload=()=>{uploadedImg=r.result; document.getElementById('img-v').src=r.result; document.getElementById('img-v').style.display='block';}; r.readAsDataURL(e.target.files[0]); }
        function checkAuth(t) { if(sessionStorage.getItem('ttk_auth')==='true') switchTab(t); else { window.pendingTab = t; document.getElementById('login-modal').style.display='block'; } }
        function handleLogin() { if(document.getElementById('admin-pass').value==='111111'){ sessionStorage.setItem('ttk_auth','true'); document.getElementById('login-modal').style.display='none'; switchTab(window.pendingTab); } else alert("Password မှားယွင်းနေပါသည်"); }
        function userLogout() { sessionStorage.removeItem('ttk_auth'); switchTab('sales-tab'); }
        function closeRestock() { document.getElementById('restock-modal').style.display='none'; }
        function closeModal() { document.getElementById('login-modal').style.display='none'; }
        function closeReceiptModal() { document.getElementById('receipt-modal').style.display='none'; }
        function resetCart() { if(confirm("စာရင်းဖျက်မှာလား?")) { currentCart=[]; renderCart(); } }

        window.onload = () => { downloadFromCloud(); syncAll(); };
    </script>
</body>
</html>
